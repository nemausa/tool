# =========================
# Prefix: Ctrl-a
# =========================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =========================
# Basic
# =========================
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# 编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# =========================
# Pane navigation
# Alt + 方向键切换 pane
# =========================
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# =========================
# Window navigation
# Alt-h / Alt-l 切换窗口
# =========================
bind -n M-h previous-window
bind -n M-l next-window

# =========================
# Layouts
# =========================
bind = select-layout even-horizontal
bind | select-layout even-vertical
bind Space select-layout tiled

# 分屏继承当前目录
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# 新窗口继承当前目录
bind c new-window -c "#{pane_current_path}"

# 快速重载配置
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# =========================
# Status bar: 底部项目窗口栏
# =========================

set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify centre

# 整体颜色：低调，不抢 shell prompt
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左侧：session 名
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#45475a]│"

# 右侧：时间
set -g status-right-length 80
set -g status-right "#[fg=#45475a]│ #[fg=#a6e3a1]%H:%M "

# 自动窗口名：当前目录名
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# 普通窗口
setw -g window-status-format "#[fg=#6c7086] #I #[fg=#cdd6f4]#W "

# 当前窗口
setw -g window-status-current-format "#[bg=#89b4fa,fg=#11111b,bold] #I:#W "

# 窗口间距
setw -g window-status-separator "  "

# 消息 / 复制模式
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#89b4fa,fg=#11111b,bold"

# Pane 边框
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Clock
setw -g clock-mode-colour "#89b4fa"
